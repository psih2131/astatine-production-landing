<div class="form-modal modal-base" id="formModal" aria-hidden="true">
    <div class="modal-overlay" tabindex="-1" data-micromodal-close>
        <div class="form-modal__container modal-container" role="dialog" aria-modal="true" aria-label="Contact form">
            <button class="modal__close" aria-label="Close" data-micromodal-close></button>
            <div class="form-modal__wrap">
                <h3 class="form-modal__title">Get in touch</h3>
                <p class="form-modal__subtitle">Tell us about your project and we'll get back to you soon</p>
                <form class="form-modal__form contact-form" action="#" method="post">
                    <div class="contact-form__field">
                        <input type="text" name="name" placeholder="Name" required />
                    </div>
                    <div class="contact-form__field">
                        <input type="email" name="email" placeholder="Email" required />
                    </div>
                    <div class="contact-form__field contact-form__field--textarea">
                        <textarea name="project" placeholder="Project brief (short)" rows="4"></textarea>
                    </div>
                    <div class="contact-form__field contact-form__field--checkbox">
                        <label>
                            <input type="checkbox" name="privacy" required />
                            <span>I agree to the <a href="/terms-of-use.html" target="_blank" rel="noopener">Terms of Use</a> and <a href="/privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a></span>
                        </label>
                    </div>
                    <div class="contact-form__field contact-form__field--submit">
                        <button type="submit">Start a project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
